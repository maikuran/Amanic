name: Build Font

on:
  push:
    branches:
      - main

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - name: Install FontForge
        run: |
          sudo apt-get update
          sudo apt-get install -y fontforge python3-fontforge

      - name: Build Font
        run: fontforge -script build_font.py

      - name: Upload font
        uses: actions/upload-artifact@v4
        with:
          name: font
          path: MyFont.ttf
